<!DOCTYPE html>
<html>
<head>
    <title>Карта нашего сервера Minecraft</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; background: #141414; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Итоговые общие размеры всей карты (3500 + 3501)
        var w = 7001; 
        var h = 7001; 

        var map = L.map('map', {
            minZoom: -4,
            maxZoom: 3,
            zoom: -2,
            crs: L.CRS.Simple
        });

        // Полные границы карты
        var southWest = map.unproject([0, h], map.getMaxZoom()-1);
        var northEast = map.unproject([w, 0], map.getMaxZoom()-1);
        var bounds = new L.LatLngBounds(southWest, northEast);
        
        // ТОЧНАЯ СТЫКОВКА КУСКОВ ПИКСЕЛЬ-В-ПИКСЕЛЬ:
        
        // 1. Верхний левый кусок (TL: 3500 x 3500)
        var boundsTL = new L.LatLngBounds(map.unproject([0, 3500], map.getMaxZoom()-1), map.unproject([3500, 0], map.getMaxZoom()-1));
        
        // 2. Верхний правый кусок (TR: 3501 x 3500)
        var boundsTR = new L.LatLngBounds(map.unproject([3500, 3500], map.getMaxZoom()-1), map.unproject([7001, 0], map.getMaxZoom()-1));
        
        // 3. Нижний левый кусок (BL: 3500 x 3501)
        var boundsBL = new L.LatLngBounds(map.unproject([0, 7001], map.getMaxZoom()-1), map.unproject([3500, 3500], map.getMaxZoom()-1));
        
        // 4. Нижний правый кусок (BR: 3501 x 3501)
        var boundsBR = new L.LatLngBounds(map.unproject([3500, 7001], map.getMaxZoom()-1), map.unproject([7001, 3500], map.getMaxZoom()-1));

        // Выводим все 4 куска на их законные места
        L.imageOverlay('map_top_left.png', boundsTL).addTo(map);
        L.imageOverlay('map_top_right.png', boundsTR).addTo(map);
        L.imageOverlay('map_bottom_left.png', boundsBL).addTo(map);
        L.imageOverlay('map_bottom_right.png', boundsBR).addTo(map);

        map.setMaxBounds(bounds);
        map.setView(bounds.getCenter(), -2);
    </script>
</body>
</html>
