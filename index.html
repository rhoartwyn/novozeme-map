<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Карта нашего сервера Minecraft</title>
    <style>
        /* Сбрасываем лишние отступы и делаем черный фон */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; /* Позволяет скроллить карту в любую сторону */
        }

        /* Контейнер для склейки 4-х карт */
        .map-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Ровно 2 колонки */
            line-height: 0; /* Убирает микро-щели между картинками по вертикали */
            font-size: 0;
            max-width: 95vw; /* Ограничиваем начальный размер под экран телефона */
            max-height: 95vh;
        }

        /* Настройки для самих картинок */
        .map-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            image-rendering: pixelated; /* Делает пиксели Minecraft четкими при приближении */
        }
    </style>
</head>
<body>

    <!-- Сетка 2х2, которая склеит картинки пиксель-в-пиксель -->
    <div class="map-container">
        <img src="map_top_left.png" alt="TL">
        <img src="map_top_right.png" alt="TR">
        <img src="map_bottom_left.png" alt="BL">
        <img src="map_bottom_right.png" alt="BR">
    </div>

</body>
</html>
