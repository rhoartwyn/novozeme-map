<!DOCTYPE html>
<html>
<head>
    <title>Карта нашего сервера Minecraft</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; background: #141414; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Создаем карту с простой системой координат (0,0 в левом нижнем углу)
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2
        });

        // Задаем координаты углов для сетки 2х2 (каждый кусок условно 1000х1000 единиц)
        var boundsTL = [[1000, 0], [2000, 1000]];     // Верхний левый
        var boundsTR = [[1000, 1000], [2000, 2000]];  // Верхний правый
        var boundsBL = [[0, 0], [1000, 1000]];         // Нижний левый
        var boundsBR = [[0, 1000], [1000, 2000]];      // Нижний правый

        // Объединяем все в общие границы карты
        var totalBounds = [[0, 0], [2000, 2000]];

        // Накладываем картинки
        L.imageOverlay('map_top_left.png', boundsTL).addTo(map);
        L.imageOverlay('map_top_right.png', boundsTR).addTo(map);
        L.imageOverlay('map_bottom_left.png', boundsBL).addTo(map);
        L.imageOverlay('map_bottom_right.png', boundsBR).addTo(map);

        // Ограничиваем камеру и центрируем её
        map.setMaxBounds(totalBounds);
        map.fitBounds(totalBounds);
    </script>
</body>
</html>
