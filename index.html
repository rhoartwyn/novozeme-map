<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта нашего сервера Minecraft</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #141414;
            color: white;
            font-family: sans-serif;
        }

        /* Контейнер для прокрутки */
        .map-scroll-box {
            width: 100%;
            height: 100%;
            overflow: auto; /* Включает прокрутку во все стороны */
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* Сетка для склейки карт */
        .map-grid {
            display: grid;
            grid-template-columns: 3500fr 3501fr; /* Пропорции ваших кусков */
            line-height: 0;
            font-size: 0;
            margin: auto; /* Центрирует карту, если она меньше экрана */
            
            /* НАЧАЛЬНЫЙ РЕЖИМ: Карта вписана в экран телефона */
            width: 95vw;
            height: auto;
            max-height: 95vh;
            object-fit: contain;
        }

        /* Когда включен режим "Оригинальный размер" */
        .map-grid.full-size {
            width: 7001px;  /* Разворачиваем в реальные 7 тысяч пикселей! */
            max-height: none;
        }

        .map-grid img {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: pixelated; /* Четкие пиксели майна */
        }

        /* Стильная кнопка переключения зума */
        .zoom-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4e505a;
            color: white;
            border: 2px solid #fff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .zoom-btn:active {
            background: #3c3f41;
        }
    </style>
</head>
<body>

    <!-- Кнопка управления масштабом -->
    <button class="zoom-btn" id="zoomToggle" onclick="toggleZoom()">🔎 Приблизить на максимум</button>

    <!-- Область прокрутки -->
    <div class="map-scroll-box">
        <!-- Сама карта -->
        <div class="map-grid" id="minecraftMap">
            <img src="map_top_left.png" alt="TL">
            <img src="map_top_right.png" alt="TR">
            <img src="map_bottom_left.png" alt="BL">
            <img src="map_bottom_right.png" alt="BR">
        </div>
    </div>

    <script>
        function toggleZoom() {
            var map = document.getElementById('minecraftMap');
            var btn = document.getElementById('zoomToggle');
            
            // Переключаем класс полноразмерного режима
            if (map.classList.contains('full-size')) {
                map.classList.remove('full-size');
                btn.innerText = "🔎 Приблизить на максимум";
            } else {
                map.classList.add('full-size');
                btn.innerText = "🔍 Отдалить всю карту";
            }
        }
    </script>

</body>
</html>
