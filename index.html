<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта нашего сервера Minecraft</title>
    <!-- Подключаем библиотеку OpenSeadragon для бесконечного супер-зума -->
    <script src="https://cloudflare.com"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #141414;
            overflow: hidden;
        }
        /* Область, где будет отображаться карта */
        #container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        // Запускаем просмотрщик
        var viewer = OpenSeadragon({
            id: "container",
            prefixUrl: "https://cloudflare.com", // Иконки управления
            showNavigationControl: false, // Прячем лишние кнопки, управляем только пальцами
            maxZoomLevel: 30,             // ВОТ ОНО! Разрешаем увеличивать хоть в 30 раз!
            minZoomLevel: 0.5,
            defaultZoomLevel: 1,
            gestureSettingsTouch: {
                pinchRotate: false       // Отключаем случайный поворот карты пальцами
            },
            
            // Склеиваем наши 4 куска в единое целое по точным координатам
            tileSources: [
                {
                    type: 'image',
                    url: 'map_top_left.png',
                    x: 0, y: 0, w: 3500 // Ширина 3500
                },
                {
                    type: 'image',
                    url: 'map_top_right.png',
                    x: 3500, y: 0, w: 3501 // Начинается там, где кончился первый
                },
                {
                    type: 'image',
                    url: 'map_bottom_left.png',
                    x: 0, y: 3500, w: 3500 // Начинается снизу (высота 3500)
                },
                {
                    type: 'image',
                    url: 'map_bottom_right.png',
                    x: 3500, y: 3500, w: 3501 // Нижний правый угол
                }
            ]
        });

        // Включаем четкие пиксели майнкрафта при сильном приближении
        viewer.addHandler('open', function() {
            var canvas = viewer.canvas.querySelector('canvas');
            if (canvas) {
                canvas.style.imageRendering = 'pixelated';
            }
        });
    </script>
</body>
</html>
