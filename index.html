<!DOCTYPE html>
<html>
<head>
    <title>Карта нашего сервера Minecraft</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; background: #141414; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {
            minZoom: -3,
            maxZoom: 3,
            zoom: -1,
            crs: L.CRS.Simple
        });

        var imageUrl = 'map.png'; 
        
        // Автоматический расчет границ для любого размера картинки Chunker
        var img = new Image();
        img.onload = function() {
            var w = this.width;
            var h = this.height;
            var southWest = map.unproject([0, h], map.getMaxZoom()-1);
            var northEast = map.unproject([w, 0], map.getMaxZoom()-1);
            var bounds = new L.LatLngBounds(southWest, northEast);
            
            L.imageOverlay(imageUrl, bounds).addTo(map);
            map.setMaxBounds(bounds);
            map.setView(bounds.getCenter(), -1);
        };
        img.src = imageUrl;
    </script>
</body>
</html>
